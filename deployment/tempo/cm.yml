apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo
  labels:
    app.kubernetes.io/name: tempo
data:
  tempo.yaml: |
    target: all
    multitenancy_enabled: false
    usage_report:
      reporting_enabled: false
    compactor:
      compaction:
        block_retention: 48h
        compacted_block_retention: 1h
        compaction_cycle: 1h
        compaction_window: 2h
    memberlist:
      bind_addr:
        - '::'
      abort_if_cluster_join_fails: false
    metrics_generator:
      metrics_ingestion_time_range_slack: 60s
      ring:
        kvstore:
          store: memberlist
      processor:
        service_graphs:
          wait: 60s
          max_items: 10000
          enable_client_server_prefix: true
          enable_virtual_node_label: true
          enable_messaging_system_latency_histogram: true
          peer_attributes:
            - peer.service
            - server.address
            - net.peer.name
            - db.name
            - db.system
            - network.peer.address
          dimensions:
            - http.method
            - http.request.method

        local_blocks:
          filter_server_spans: true
          flush_to_storage: true
        host_info:
          host_identifiers:
            - k8s.node.name
            - host.id
          metric_name: traces_host_info
        span_metrics:
          enable_target_info: true
      traces_storage:
        path: /var/tempo/generator/traces
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          # - url: http://prometheus-server/api/v1/write
          #   send_exemplars: true
          #   name: prometheus
          - url: http://mimir/api/v1/push
            send_exemplars: true
            name: mimir
    distributor:
      max_attribute_bytes: 2048
      receivers:
        jaeger:
          protocols:
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
            thrift_http:
              endpoint: 0.0.0.0:14268
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    server:
      log_level: warn
      log_format: json
      grpc_listen_address: 0.0.0.0
      grpc_listen_port: 9095
      http_listen_address: 0.0.0.0
      http_listen_port: 3100
    storage:
      trace:
        backend: local
        block:
          version: vParquet4
          bloom_filter_false_positive: .05
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    querier:
      max_concurrent_queries: 20
      frontend_worker:
        frontend_address: ${POD_IP}:9095
    overrides:
      defaults:
        ingestion:
          max_traces_per_user: 0
        metrics_generator:
          processors: [service-graphs, span-metrics, local-blocks, host-info]
          generate_native_histograms: both
