---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy
  labels:
    app.kubernetes.io/name: alloy
data:
  config.alloy: |-
    logging {
    	level  = "warn"
    	format = "json"
    }

    discovery.kubelet "pods" {
      refresh_interval  = "60s"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      url               = string.format("https://%s:10250", sys.env("NODE_IP"))
      tls_config {
        insecure_skip_verify = true
      }
    }

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.kubernetes "services" {
      role = "service"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubelet.pods.targets
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_pod_label_(.+)"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_node_label_(.+)"
      }
    }

    discovery.relabel "all_targets_with_address" {
      targets = array.concat(discovery.kubelet.pods.targets, discovery.kubernetes.nodes.targets, discovery.kubernetes.services.targets)
      rule {
        action = "drop"
        regex = "Succeeded|Failed"
        source_labels = ["__meta_kubernetes_pod_phase"]
      }
      rule {
        action = "replace"
        regex = "(.*)@(.*)"
        replacement = "k8s/${1}/${2}"
        separator = "@"
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
        target_label = "service_name"
      }
      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = ".+"
        target_label  = "source"
        replacement   = "services"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        regex         = ".+"
        target_label  = "source"
        replacement   = "kubelet_pods"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "false"
        action        = "drop"
      }
      rule {
        source_labels = ["__address__"]
        regex        = ".+"
        action       = "keep"
      }
      rule {
        action = "labelmap"
        regex = "__meta_kubernetes_node_address_(.+)"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_node_label_(.+)"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_pod_label_(.+)"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_service_label_(.+)"
      }
      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_namespace"]
        target_label = "namespace"
      }
      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label = "node"
      }
      rule {
        action = "labeldrop"
        regex  = "pod_template_hash|controller_revision_hash|checksum_.*|pod_uid|instance|job"
      }
    }

    loki.write "loki" {
      max_streams = 1000
      endpoint {
        url                 = "http://loki:3100/loki/api/v1/push"
        retry_on_http_429   = true
        min_backoff_period  = "500ms"
        max_backoff_period  = "5m"
        max_backoff_retries = 10
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs_filter.receiver]
    }

    loki.process "pod_logs_filter" {
      stage.drop {
        older_than          = "1h"
        drop_counter_reason = "line_too_old"
      }
      forward_to = [loki.write.loki.receiver]
    }

    loki.source.kubernetes_events "cluster" {
      forward_to = [loki.write.loki.receiver]
    }

    loki.source.syslog "local" {
      listener {
        address  = "0.0.0.0:51893"
        labels   = { component = "loki.source.syslog", protocol = "tcp" }
      }

      listener {
        address  = "0.0.0.0:51898"
        protocol = "udp"
        labels   = { component = "loki.source.syslog", protocol = "udp"}
      }

      forward_to = [loki.write.loki.receiver]
    }

    prometheus.remote_write "prometheus" {
      wal {
        max_keepalive_time = "8h"
        min_keepalive_time = "5m"
        truncate_frequency = "1h"
      }
      endpoint {
        url                    = "http://prometheus-server/api/v1/write"
        remote_timeout         = "10s"
        send_exemplars         = true
        send_native_histograms = true
      }
    }

    prometheus.remote_write "mimir" {
      wal {
        max_keepalive_time = "8h"
        min_keepalive_time = "5m"
        truncate_frequency = "1h"
      }
      endpoint {
        url                    = "http://mimir/api/v1/push"
        remote_timeout         = "10s"
        send_exemplars         = true
        send_native_histograms = true
      }
    }

    prometheus.scrape "default" {
      targets    = discovery.relabel.all_targets_with_address.output
      forward_to = [prometheus.remote_write.prometheus.receiver, prometheus.remote_write.mimir.receiver]
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo:4317"
        tls {
          insecure = true
        }
      }
    }

    otelcol.processor.k8sattributes "default" {
      pod_association {
        source {
          from = "connection"
        }
      }
      pod_association {
        source {
          from  = "resource_attribute"
          name  = "k8s.pod.ip"
        }
      }
      extract {
        metadata = [
          "k8s.namespace.name",
          "k8s.node.name",
          "k8s.pod.name",
          "k8s.pod.uid",
          "k8s.deployment.name",
        ]
      }
      output {
        traces = [
          otelcol.processor.tail_sampling.rate_limiter.input,
        ]
      }
    }

    otelcol.processor.tail_sampling "rate_limiter" {
      policy {
        name = "sample-errors"
        type = "status_code"
        status_code {
          status_codes = ["ERROR"]
        }
      }
      policy {
        name = "rate-limit-ok"
        type = "rate_limiting"
        rate_limiting {
          spans_per_second = 400
        }
      }
      output {
        traces = [
          otelcol.processor.batch.otel.input,
          otelcol.connector.servicegraph.tempo.input,
        ]
      }
    }

    otelcol.connector.servicegraph "tempo" {
      dimensions = ["http.method", "http.request.method", "http.target", "url.path"]
      output {
        metrics = [otelcol.exporter.prometheus.otel.input]
      }
    }

    otelcol.receiver.otlp "otel" {
      grpc {
        endpoint = sys.env("POD_IP") + ":4317"
      }
      http {
        endpoint = sys.env("POD_IP") + ":4318"
      }

      output {
        logs    = [otelcol.processor.batch.otel.input]
        metrics = [otelcol.processor.batch.otel.input]
        traces  = [otelcol.processor.k8sattributes.default.input]
      }
    }

    otelcol.processor.batch "otel" {
      timeout = "6s"
      send_batch_size = 200
      send_batch_max_size = 300
      output {
        logs    = [otelcol.exporter.loki.loki.input]
        metrics = [otelcol.exporter.prometheus.otel.input]
        traces  = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.loki "loki" {
      forward_to = [loki.write.loki.receiver]
    }

    otelcol.exporter.prometheus "otel" {
        forward_to = [prometheus.remote_write.prometheus.receiver, prometheus.remote_write.mimir.receiver]
        gc_frequency = "2m"
    }
