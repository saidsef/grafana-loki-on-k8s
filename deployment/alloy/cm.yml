---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy
  labels:
    app.kubernetes.io/name: alloy
data:
  config.alloy: |-
    logging {
    	level  = "warn"
    	format = "json"
    }

    discovery.kubelet "pods" {
      refresh_interval  = "60s"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      url               = string.format("https://%s:10250", sys.env("NODE_IP"))
      tls_config {
        insecure_skip_verify = true
      }
    }

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.kubernetes "services" {
      role = "service"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubelet.pods.targets
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_pod_label_(.+)"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_node_label_(.+)"
      }
    }

    discovery.relabel "all_targets_with_address" {
      targets = array.concat(discovery.kubelet.pods.targets, discovery.kubernetes.nodes.targets, discovery.kubernetes.services.targets)
      rule {
        action = "drop"
        regex = "Succeeded|Failed"
        source_labels = ["__meta_kubernetes_pod_phase"]
      }
      rule {
        action = "replace"
        regex = "(.*)@(.*)"
        replacement = "k8s/${1}/${2}"
        separator = "@"
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
        target_label = "service_name"
      }
      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = ".+"
        target_label  = "source"
        replacement   = "services"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        regex         = ".+"
        target_label  = "source"
        replacement   = "kubelet_pods"
        action        = "replace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "false"
        action        = "drop"
      }
      rule {
        source_labels = ["__address__"]
        regex        = ".+"
        action       = "keep"
      }
      rule {
        action        = "replace"
        source_labels = ["__meta_kubernetes_node_label_kubernetes_io_hostname"]
        regex         = "(.+)"
        target_label  = "node_hostname"
      }
      rule {
        action        = "replace"
        source_labels = ["__meta_kubernetes_node_label_topology_kubernetes_io_zone"]
        regex         = "(.+)"
        target_label  = "zone"
      }
      rule {
        action        = "replace"
        source_labels = ["__meta_kubernetes_node_label_topology_kubernetes_io_region"]
        regex         = "(.+)"
        target_label  = "region"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_pod_label_(.+)"
      }
      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_service_label_(.+)"
      }
      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_namespace"]
        target_label = "namespace"
      }
      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label = "node"
      }
      rule {
        action = "labeldrop"
        regex  = "pod_template_hash|controller_revision_hash|checksum_.*|pod_uid|instance|job"
      }
    }

    loki.write "loki" {
      max_streams = 1000
      endpoint {
        url                 = "http://loki:3100/loki/api/v1/push"
        retry_on_http_429   = true
        min_backoff_period  = "500ms"
        max_backoff_period  = "5m"
        max_backoff_retries = 10
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs_filter.receiver]
    }

    loki.process "pod_logs_filter" {
      stage.drop {
        older_than          = "1h"
        drop_counter_reason = "line_too_old"
      }
      forward_to = [loki.write.loki.receiver]
    }

    loki.source.kubernetes_events "cluster" {
      forward_to = [loki.write.loki.receiver]
    }

    prometheus.remote_write "prometheus" {
      wal {
        max_keepalive_time = "8h"
        min_keepalive_time = "5m"
        truncate_frequency = "1h"
      }
      endpoint {
        url                    = "http://prometheus-server/api/v1/write"
        remote_timeout         = "10s"
        send_exemplars         = true
        send_native_histograms = true
      }
    }

    prometheus.remote_write "mimir" {
      wal {
        max_keepalive_time = "8h"
        min_keepalive_time = "5m"
        truncate_frequency = "1h"
      }
      endpoint {
        url                    = "http://mimir/api/v1/push"
        remote_timeout         = "10s"
        send_exemplars         = true
        send_native_histograms = true
      }
    }

    prometheus.scrape "default" {
      targets    = discovery.relabel.all_targets_with_address.output
      forward_to = [prometheus.remote_write.prometheus.receiver, prometheus.remote_write.mimir.receiver]
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo:4317"
        tls {
          insecure = true
        }
      }
    }

    otelcol.processor.k8sattributes "default" {
      pod_association {
        source {
          from = "connection"
        }
      }
      pod_association {
        source {
          from  = "resource_attribute"
          name  = "k8s.pod.ip"
        }
      }
      extract {
        metadata = [
          "k8s.namespace.name",
          "k8s.node.name",
          "k8s.pod.name",
          "k8s.pod.uid",
          "k8s.deployment.name",
        ]
      }
      output {
        traces = [
          otelcol.processor.tail_sampling.rate_limiter.input,
        ]
      }
    }

    otelcol.processor.tail_sampling "rate_limiter" {
      policy {
        name = "sample-errors"
        type = "status_code"
        status_code {
          status_codes = ["ERROR"]
        }
      }
      policy {
        name = "rate-limit-ok"
        type = "rate_limiting"
        rate_limiting {
          spans_per_second = 400
        }
      }
      output {
        traces = [
          otelcol.connector.servicegraph.tempo.input,
          otelcol.processor.batch.otel.input,
        ]
      }
    }

    otelcol.connector.servicegraph "tempo" {
      dimensions = ["http.method", "http.request.method", "http.target", "url.path"]
      output {
        metrics = [otelcol.exporter.prometheus.otel.input]
      }
    }

    otelcol.receiver.otlp "otel" {
      grpc {
        endpoint = sys.env("POD_IP") + ":4317"
      }
      http {
        endpoint = sys.env("POD_IP") + ":4318"
      }

      output {
        logs    = [otelcol.processor.batch.otel.input]
        metrics = [otelcol.processor.batch.otel.input]
        traces  = [otelcol.processor.k8sattributes.default.input]
      }
    }

    otelcol.processor.batch "otel" {
      timeout = "6s"
      send_batch_size = 200
      send_batch_max_size = 300
      output {
        logs    = [otelcol.exporter.loki.loki.input]
        metrics = [otelcol.exporter.prometheus.otel.input]
        traces  = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.loki "loki" {
      forward_to = [loki.write.loki.receiver]
    }

    otelcol.exporter.prometheus "otel" {
        forward_to = [prometheus.remote_write.prometheus.receiver, prometheus.remote_write.mimir.receiver]
        gc_frequency = "2m"
    }

    // --- Pyroscope: pprof scraping + eBPF profiles from Beyla ---
    // eBPF CPU profiles (all languages, no annotations required) arrive via
    // otelcol.receiver.otlp and are forwarded directly to pyroscope.write above.
    //
    // pprof scraping (Go services): memory, cpu, goroutine are opt-in.
    // Single-annotation shortcut: set profiles.grafana.com/port: "<n>" on a pod
    // to enable all three types without per-type annotations.
    // Per-type opt-out: profiles.grafana.com/<type>.scrape: "false".
    // Block, mutex, fgprof remain fully opt-in (high overhead; require app-side setup).
    // pyroscope.write silently drops profiles after 3 retries so Alloy stays
    // healthy when Pyroscope is not deployed alongside this stack.

    discovery.kubernetes "pyroscope_pods" {
      role = "pod"
    }

    discovery.relabel "pyroscope_pods" {
      targets = discovery.kubernetes.pyroscope_pods.targets

      rule {
        action        = "drop"
        source_labels = ["__meta_kubernetes_pod_phase"]
        regex         = "Pending|Succeeded|Failed|Completed"
      }

      rule {
        action = "labelmap"
        regex  = "__meta_kubernetes_pod_label_(.+)"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "service_name"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "(.+)"
        target_label  = "service_name"
        replacement   = "$1"
      }

      // Single-annotation shortcut: profiles.grafana.com/port: "<n>" without a
      // per-type scrape annotation synthesises scrape=true for memory, cpu, goroutine.
      // Regex fires only when the type-specific scrape annotation is absent (empty)
      // and the global port annotation is a number, so explicit opt-out ("false") is
      // preserved and explicit per-type opt-in ("true") is left unchanged.
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scrape",
                         "__meta_kubernetes_pod_annotation_profiles_grafana_com_port"]
        regex         = ";(\\d+)"
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scrape"
        action        = "replace"
        replacement   = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scrape",
                         "__meta_kubernetes_pod_annotation_profiles_grafana_com_port"]
        regex         = ";(\\d+)"
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scrape"
        action        = "replace"
        replacement   = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_scrape",
                         "__meta_kubernetes_pod_annotation_profiles_grafana_com_port"]
        regex         = ";(\\d+)"
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_scrape"
        action        = "replace"
        replacement   = "true"
      }
    }

    // Memory
    discovery.relabel "pyroscope_pods_memory_default_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port_name"]
        action        = "keep"
        regex         = ""
      }

      // If no per-type port annotation but global port annotation is set, use global.
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port",
                         "__meta_kubernetes_pod_annotation_profiles_grafana_com_port"]
        regex         = ";(\\d+)"
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port"
        action        = "replace"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    discovery.relabel "pyroscope_pods_memory_custom_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port_name"]
        action        = "drop"
        regex         = ""
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_port_name"]
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port_name"
        action        = "keepequal"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_memory_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    pyroscope.scrape "pyroscope_scrape_memory" {
      clustering {
        enabled = true
      }

      targets    = array.concat(discovery.relabel.pyroscope_pods_memory_default_name.output, discovery.relabel.pyroscope_pods_memory_custom_name.output)
      forward_to = [pyroscope.write.pyroscope.receiver]

      profiling_config {
        profile.memory {
          enabled = true
        }

        profile.process_cpu {
          enabled = false
        }

        profile.goroutine {
          enabled = false
        }

        profile.block {
          enabled = false
        }

        profile.mutex {
          enabled = false
        }

        profile.fgprof {
          enabled = false
        }
      }
    }

    // CPU
    discovery.relabel "pyroscope_pods_cpu_default_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port_name"]
        action        = "keep"
        regex         = ""
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port",
                         "__meta_kubernetes_pod_annotation_profiles_grafana_com_port"]
        regex         = ";(\\d+)"
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port"
        action        = "replace"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    discovery.relabel "pyroscope_pods_cpu_custom_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port_name"]
        action        = "drop"
        regex         = ""
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_port_name"]
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port_name"
        action        = "keepequal"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_cpu_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    pyroscope.scrape "pyroscope_scrape_cpu" {
      clustering {
        enabled = true
      }

      targets    = array.concat(discovery.relabel.pyroscope_pods_cpu_default_name.output, discovery.relabel.pyroscope_pods_cpu_custom_name.output)
      forward_to = [pyroscope.write.pyroscope.receiver]

      profiling_config {
        profile.memory {
          enabled = false
        }

        profile.process_cpu {
          enabled = true
        }

        profile.goroutine {
          enabled = false
        }

        profile.block {
          enabled = false
        }

        profile.mutex {
          enabled = false
        }

        profile.fgprof {
          enabled = false
        }
      }
    }

    // Goroutine
    discovery.relabel "pyroscope_pods_goroutine_default_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port_name"]
        action        = "keep"
        regex         = ""
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port",
                         "__meta_kubernetes_pod_annotation_profiles_grafana_com_port"]
        regex         = ";(\\d+)"
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port"
        action        = "replace"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    discovery.relabel "pyroscope_pods_goroutine_custom_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port_name"]
        action        = "drop"
        regex         = ""
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_port_name"]
        target_label  = "__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port_name"
        action        = "keepequal"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_goroutine_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    pyroscope.scrape "pyroscope_scrape_goroutine" {
      clustering {
        enabled = true
      }

      targets    = array.concat(discovery.relabel.pyroscope_pods_goroutine_default_name.output, discovery.relabel.pyroscope_pods_goroutine_custom_name.output)
      forward_to = [pyroscope.write.pyroscope.receiver]

      profiling_config {
        profile.memory {
          enabled = false
        }

        profile.process_cpu {
          enabled = false
        }

        profile.goroutine {
          enabled = true
        }

        profile.block {
          enabled = false
        }

        profile.mutex {
          enabled = false
        }

        profile.fgprof {
          enabled = false
        }
      }
    }

    // Block contention
    discovery.relabel "pyroscope_pods_block_default_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_block_scrape"]
        action        = "keep"
        regex         = "true"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_block_port_name"]
        action        = "keep"
        regex         = ""
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_block_scheme"]
        action        = "replace"
        regex         = "(https?)"
        target_label  = "__scheme__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_block_path"]
        action        = "replace"
        regex         = "(.+)"
        target_label  = "__profile_path__"
        replacement   = "$1"
      }

      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_profiles_grafana_com_block_port"]
        action        = "replace"
        regex         = "(.+?)(?::\\d+)?;(\\d+)"
        target_label  = "__address__"
        replacement   = "$1:$2"
      }
    }

    discovery.relabel "pyroscope_pods_block_custom_name" {
      targets = discovery.relabel.pyroscope_pods.output

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_profiles_grafana_com_block_scrape"]
        action        = "keep"
